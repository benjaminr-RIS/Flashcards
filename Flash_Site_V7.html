<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB MAI Flashcard Engine</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- MathJax for LaTeX Rendering -->
    <script>
        // Promise that resolves once MathJax is fully initialised
        window._mathJaxReady = new Promise(resolve => {
            window.MathJax = {
                tex: {
                    inlineMath: [['$', '$'], ['\\(', '\\)']],
                    displayMath: [['$$', '$$'], ['\\[', '\\]']],
                    processEscapes: true
                },
                options: {
                    skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
                },
                startup: {
                    typeset: false,
                    ready() {
                        MathJax.startup.defaultReady();
                        resolve();
                    }
                }
            };
        });
        // Serialise typesetPromise calls — MathJax throws if called concurrently
        window._mjQueue = Promise.resolve();
        window._typesetEl = (el) => {
            window._mjQueue = window._mjQueue.then(() =>
                window._mathJaxReady.then(() =>
                    window.MathJax.typesetPromise([el]).catch(() => {})
                )
            );
            return window._mjQueue;
        };
    </script>
    <script src="https://www.desmos.com/api/v1.9/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
    <!-- Card data — edit cards.js to update questions without touching this file -->
    <script src="cards.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        .perspective-1000 { perspective: 1000px; }
        
        .card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            width: 100%;
            height: 100%;
            position: relative;
        }
        .card-inner.is-flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            backface-visibility: hidden;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        .card-front {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid #334155;
        }
        .card-back {
            background: linear-gradient(145deg, #3b82f6, #1d4ed8);
            transform: rotateY(180deg);
            border: 1px solid #60a5fa;
            color: white;
            overflow-y: auto;
        }
        .card-back::-webkit-scrollbar { width: 8px; }
        .card-back::-webkit-scrollbar-track { background: transparent; }
        .card-back::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }
        /* Hide back faces until the card is actually flipped — prevents flash on navigation */
        .back-hidden .card-back,
        .back-hidden .card-back-graph {
            visibility: hidden;
        }
        .card-back-graph {
            background: linear-gradient(145deg, #1e3a5f, #0f2744);
            transform: rotateY(180deg);
            border: 1px solid #3b82f6;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: stretch;
            padding: 0;
            height: 100%;
        }
        .graph-answer-strip {
            padding: 1.25rem 1.5rem 0.75rem;
            flex-shrink: 0;
        }
        .desmos-wrapper {
            flex: 1;
            min-height: 0;
            width: 100%;
        }

        
        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        /* ── Diagnostic Mode ────────────────────────────────────────────── */
        .diag-panel {
            background: rgba(15, 23, 42, 0.97);
            border: 1px solid #f59e0b;
            border-radius: 1rem;
            box-shadow: 0 0 0 2px rgba(245,158,11,0.15), 0 20px 40px rgba(0,0,0,0.6);
            animation: diagSlideIn 0.2s ease-out;
        }
        @keyframes diagSlideIn {
            from { opacity: 0; transform: translateY(8px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .diag-checkbox-label {
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            padding: 0.45rem 0.6rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 0.82rem;
            color: #cbd5e1;
            line-height: 1.4;
        }
        .diag-checkbox-label:hover { background: rgba(245,158,11,0.08); }
        .diag-checkbox-label input[type="checkbox"] {
            accent-color: #f59e0b;
            width: 15px;
            height: 15px;
            flex-shrink: 0;
            margin-top: 1px;
            cursor: pointer;
        }
        .diag-checkbox-label.checked-item {
            color: #fde68a;
            background: rgba(245,158,11,0.1);
        }
        .diag-btn-flag {
            background: rgba(245,158,11,0.12);
            border: 1px solid rgba(245,158,11,0.4);
            color: #fbbf24;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.3rem 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.04em;
        }
        .diag-btn-flag:hover { background: rgba(245,158,11,0.25); }
        .diag-btn-flag.active {
            background: #f59e0b;
            color: #0f172a;
            border-color: #f59e0b;
        }
        .diag-flagged-indicator {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 14px;
            height: 14px;
            background: #f59e0b;
            border-radius: 50%;
            border: 2px solid #0f172a;
        }
        .diag-log-badge {
            background: #f59e0b;
            color: #0f172a;
            font-size: 0.65rem;
            font-weight: 800;
            border-radius: 9999px;
            padding: 0 5px;
            margin-left: 4px;
            line-height: 1.6;
            display: inline-block;
            vertical-align: middle;
        }
        .export-btn {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #0f172a;
            font-weight: 800;
            border-radius: 0.75rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
            letter-spacing: 0.02em;
        }
        .export-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .export-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // MASTER DECK WITH 'mode', 'lvl' (sl, hl, both) and tags
        // Card data is loaded from cards.js (window.masterDeck)
        // To update cards, edit cards.js — no need to touch this file.
        const masterDeck = window.masterDeck || [];


        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }


        // ── Desmos helpers ──────────────────────────────────────────────────────────
        const bt = String.fromCharCode(96);

        const DESMOS_CFG = {
            expressions: false, settingsMenu: false, zoomButtons: false,
            expressionsTopbar: false, keypad: false, border: false,
            lockViewport: true, autosize: true, backgroundColor: '#f8fafc',
        };

        const STYLE_MAP = () => ({
            DASHED: Desmos.styles && Desmos.styles.DASHED || 'DASHED',
            DOTTED: Desmos.styles && Desmos.styles.DOTTED || 'DOTTED',
            SOLID:  Desmos.styles && Desmos.styles.SOLID  || 'SOLID',
        });

        const DesmosGraph = ({ spec, innerRef, isFront }) => {
            const divRef  = React.useRef(null);
            const calcRef = React.useRef(null);

            // Init immediately on mount / spec change — graph is ready before or during flip
            React.useEffect(() => {
                if (!divRef.current) return;
                if (calcRef.current) { calcRef.current.destroy(); calcRef.current = null; }
                const sm = STYLE_MAP();
                const cfg = Object.assign({}, DESMOS_CFG);
                if (spec.squareAxes) cfg.lockViewport = false; // squareAxes needs free viewport
                const calc = Desmos.GraphingCalculator(divRef.current, cfg);
                calcRef.current = calc;
                if (spec.squareAxes) {
                    // Force equal axis scale so circles render as circles
                    calc.updateSettings({ squareAxes: true });
                    calc.setMathBounds(spec.bounds);
                } else {
                    calc.setMathBounds(spec.bounds);
                }
                spec.expressions.forEach(expr => {
                    const opts = { id: expr.id, latex: expr.latex, color: expr.color };
                    if (expr.lineStyle  !== undefined) opts.lineStyle  = sm[expr.lineStyle] || expr.lineStyle;
                    if (expr.lineWidth  !== undefined) opts.lineWidth  = expr.lineWidth;
                    if (expr.pointSize  !== undefined) opts.pointSize  = expr.pointSize;
                    if (expr.hidden     !== undefined) opts.hidden     = expr.hidden;
                    if (expr.showLabel) {
                            opts.showLabel = true;
                            opts.label = expr.labelMath ? bt + expr.label + bt : expr.label;
                        }
                    if (expr.labelOrientation !== undefined) opts.labelOrientation = expr.labelOrientation;
                    calc.setExpression(opts);
                });
                return () => { if (calcRef.current) { calcRef.current.destroy(); calcRef.current = null; } };
            }, [spec]);

            // Resize after flip completes (back graphs) or immediately (front graphs)
            React.useEffect(() => {
                if (isFront) {
                    // Front face is immediately visible — resize after a short settle
                    const t = setTimeout(() => { if (calcRef.current) calcRef.current.resize(); }, 50);
                    return () => clearTimeout(t);
                }
                const el = innerRef && innerRef.current;
                if (!el) return;
                const onEnd = (e) => {
                    if (e.propertyName === 'transform' && calcRef.current) {
                        calcRef.current.resize();
                    }
                };
                el.addEventListener('transitionend', onEnd);
                return () => el.removeEventListener('transitionend', onEnd);
            }, [innerRef, isFront]);

            return <div ref={divRef} style={{ width: '100%', height: '100%' }} />;
        };

        // ── Diagnostic Mode Constants ─────────────────────────────────────────────
        const ISSUE_TYPES = [
            { id: 'wrong_info',       label: 'Incorrect information',          icon: '❌' },
            { id: 'insufficient',     label: 'Insufficient explanation',        icon: '📝' },
            { id: 'broken_latex',     label: 'Broken LaTeX formatting',         icon: '🔣' },
            { id: 'missing_desmos',   label: 'Missing Desmos graph',            icon: '📉' },
            { id: 'broken_desmos',    label: 'Incorrect / broken Desmos graph', icon: '📊' },
            { id: 'wrong_level',      label: 'Wrong level (SL / HL)',           icon: '🎓' },
            { id: 'wrong_topic',      label: 'Wrong topic (1–5)',               icon: '📂' },
        ];

        const App = () => {
            const [gameState, setGameState] = useState('menu'); // menu, playing, complete
            const [deck, setDeck] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            // Filters
            const [selectedMode, setSelectedMode] = useState('all');
            const [selectedStrand, setSelectedStrand] = useState('all');
            const [selectedLevel, setSelectedLevel] = useState('all');
            const cardInnerRef = React.useRef(null);

            // ── Diagnostic state ──────────────────────────────────────────────────
            const [diagMode, setDiagMode] = useState(false);
            const [diagPanelOpen, setDiagPanelOpen] = useState(false);
            // reports: Map of cardKey → { issues: Set, comment: string, cardMeta }
            const [diagReports, setDiagReports] = useState({});

            const getCardKey = (card, index) =>
                `${card.t}|${card.lvl}|${card.mode}|${index}|${card.q.slice(0, 40)}`;

            const currentCardKey = (gameState === 'playing' && deck.length > 0)
                ? getCardKey(deck[currentIndex], currentIndex)
                : null;

            const currentReport = currentCardKey && diagReports[currentCardKey]
                ? diagReports[currentCardKey]
                : { issues: [], comment: '' };

            const totalFlagged = Object.keys(diagReports).length;

            const toggleIssue = (issueId) => {
                if (!currentCardKey) return;
                setDiagReports(prev => {
                    const existing = prev[currentCardKey] || { issues: [], comment: '', cardMeta: null };
                    const card = deck[currentIndex];
                    const issues = existing.issues.includes(issueId)
                        ? existing.issues.filter(i => i !== issueId)
                        : [...existing.issues, issueId];
                    if (issues.length === 0 && !existing.comment) {
                        const next = { ...prev };
                        delete next[currentCardKey];
                        return next;
                    }
                    return {
                        ...prev,
                        [currentCardKey]: {
                            ...existing,
                            issues,
                            cardMeta: { t: card.t, lvl: card.lvl, mode: card.mode, q: card.q, a: card.a, deckIndex: currentIndex }
                        }
                    };
                });
            };

            const setComment = (comment) => {
                if (!currentCardKey) return;
                setDiagReports(prev => {
                    const existing = prev[currentCardKey] || { issues: [], comment: '', cardMeta: null };
                    const card = deck[currentIndex];
                    if (!comment && existing.issues.length === 0) {
                        const next = { ...prev };
                        delete next[currentCardKey];
                        return next;
                    }
                    return {
                        ...prev,
                        [currentCardKey]: {
                            ...existing,
                            comment,
                            cardMeta: { t: card.t, lvl: card.lvl, mode: card.mode, q: card.q, a: card.a, deckIndex: currentIndex }
                        }
                    };
                });
            };

            const exportLog = () => {
                const entries = Object.entries(diagReports);
                if (entries.length === 0) return;

                const lines = ['IB MAI FLASHCARD DIAGNOSTIC REPORT', '='.repeat(50), `Generated: ${new Date().toLocaleString()}`, `Total flagged cards: ${entries.length}`, ''];

                entries.forEach(([key, report], i) => {
                    const m = report.cardMeta;
                    lines.push(`--- CARD ${i + 1} ---`);
                    lines.push(`Topic: ${m.t}  |  Level: ${m.lvl.toUpperCase()}  |  Mode: ${m.mode}`);
                    lines.push(`Question: ${m.q.replace(/<[^>]+>/g,'')}`);
                    lines.push(`Answer:   ${m.a.replace(/<[^>]+>/g,'').slice(0,120)}${m.a.length > 120 ? '...' : ''}`);
                    if (report.issues.length > 0) {
                        lines.push(`Issues:`);
                        report.issues.forEach(id => {
                            const it = ISSUE_TYPES.find(x => x.id === id);
                            lines.push(`  ${it ? it.icon : '•'} [${id}] ${it ? it.label : id}`);
                        });
                    }
                    if (report.comment) {
                        lines.push(`Comment: ${report.comment}`);
                    }
                    lines.push('');
                });

                lines.push('='.repeat(50));
                lines.push('END OF REPORT');

                const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `mai_diagnostic_${new Date().toISOString().slice(0,10)}.txt`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const exportJSON = () => {
                const entries = Object.entries(diagReports);
                if (entries.length === 0) return;
                const payload = entries.map(([key, report]) => ({
                    cardKey: key,
                    ...report.cardMeta,
                    issues: report.issues,
                    issueLabels: report.issues.map(id => ISSUE_TYPES.find(x => x.id === id)?.label || id),
                    comment: report.comment
                }));
                const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `mai_diagnostic_${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            // Force strand and level adjustments if Command Terms mode is selected
            useEffect(() => {
                if (selectedMode === 'command_term') {
                    setSelectedStrand('all');
                }
            }, [selectedMode]);

            // Refs for scoped MathJax typesetting — never touches Desmos container
            const frontRef = React.useRef(null);
            const backTextRef = React.useRef(null);
            const [mathReady, setMathReady] = React.useState(false);
            const [backReady, setBackReady] = React.useState(false);

            // On card change: reset both ready states, typeset front
            useEffect(() => {
                let cancelled = false;
                setMathReady(false);
                setBackReady(false);
                const el = frontRef.current;
                if (!el) return;
                window._typesetEl(el).then(() => {
                    if (!cancelled && el.isConnected) setMathReady(true);
                });
                return () => { cancelled = true; };
            }, [currentIndex, gameState]);

            // On flip to back: typeset back face independently
            useEffect(() => {
                if (!isFlipped) return;
                let cancelled = false;
                setBackReady(false);
                const el = backTextRef.current;
                if (!el) return;
                window._typesetEl(el).then(() => {
                    if (!cancelled && el.isConnected) setBackReady(true);
                });
                return () => { cancelled = true; };
            }, [isFlipped, currentIndex]);

            // Keyboard Controls
            useEffect(() => {
                if (gameState !== 'playing') return;

                const handleKeyDown = (e) => {
                    if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        setDiagPanelOpen(false);
                        if (currentIndex < deck.length - 1) {
                            setCurrentIndex(prev => prev + 1);
                            setIsFlipped(false);
                        } else {
                            setGameState('complete');
                        }
                    } else if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        setDiagPanelOpen(false);
                        if (currentIndex > 0) {
                            setCurrentIndex(prev => prev - 1);
                            setIsFlipped(false);
                        }
                    } else if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                        e.preventDefault();
                        setIsFlipped(prev => !prev);
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [gameState, currentIndex, deck.length]);

            const filteredDeck = useMemo(() => {
                return masterDeck.filter(card => {
                    // Match Mode
                    const matchMode = selectedMode === 'all' || card.mode === selectedMode || (selectedMode === 'definition' && card.mode === 'vocab');
                    
                    // Match Strand
                    let matchStrand = true;
                    if (selectedStrand !== 'all') {
                        if (selectedStrand === 'exam') matchStrand = card.t === 'Exam';
                        else matchStrand = card.t.startsWith(selectedStrand);
                    }

                    // Match Level (SL, HL, or Both)
                    let matchLevel = true;
                    if (selectedLevel === 'sl') matchLevel = card.lvl === 'sl' || card.lvl === 'both';
                    if (selectedLevel === 'hl') matchLevel = card.lvl === 'hl' || card.lvl === 'both';

                    return matchMode && matchStrand && matchLevel;
                });
            }, [selectedMode, selectedStrand, selectedLevel]);

            const startGame = (count) => {
                if (filteredDeck.length === 0) return;
                const shuffled = shuffle([...filteredDeck]);
                const selected = count === 'all' ? shuffled : shuffled.slice(0, count);
                setDeck(selected);
                setCurrentIndex(0);
                setIsFlipped(false);
                setGameState('playing');
            };

            const handleCardClick = () => {
                setIsFlipped(!isFlipped);
            };

            if (gameState === 'menu') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6">
                        <div className="max-w-2xl w-full text-center space-y-8">
                            <div className="flex items-center justify-center gap-4">
                                <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500 pb-2">
                                    MAI Mastery
                                </h1>
                            </div>
                            <p className="text-slate-400 text-lg">
                                Configure your deck by mode, syllabus strand, and level.
                            </p>

                            {/* Diagnostic Mode Toggle */}
                            <div className={`rounded-2xl border p-4 flex items-center justify-between transition-all ${diagMode ? 'bg-amber-950/40 border-amber-600/60' : 'bg-slate-800/60 border-slate-700'}`}>
                                <div className="text-left">
                                    <div className="flex items-center gap-2">
                                        <span className="text-lg">🔍</span>
                                        <span className={`font-bold text-sm ${diagMode ? 'text-amber-400' : 'text-slate-300'}`}>Diagnostic Mode</span>
                                        {totalFlagged > 0 && <span className="diag-log-badge">{totalFlagged} flagged</span>}
                                    </div>
                                    <p className="text-xs text-slate-500 mt-0.5 ml-7">Flag errors as you study. Export a report for AI correction.</p>
                                </div>
                                <div className="flex items-center gap-2 ml-4 flex-shrink-0">
                                    {totalFlagged > 0 && (
                                        <div className="flex gap-2">
                                            <button onClick={exportLog} className="export-btn text-xs py-1.5 px-3">📄 TXT</button>
                                            <button onClick={exportJSON} className="export-btn text-xs py-1.5 px-3">📋 JSON</button>
                                        </div>
                                    )}
                                    <button
                                        onClick={() => setDiagMode(d => !d)}
                                        className={`relative w-12 h-6 rounded-full transition-all duration-200 flex-shrink-0 ${diagMode ? 'bg-amber-500' : 'bg-slate-600'}`}
                                    >
                                        <span className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-all duration-200 ${diagMode ? 'left-6' : 'left-0.5'}`}></span>
                                    </button>
                                </div>
                            </div>
                            
                            <div className="bg-slate-800/80 p-6 rounded-3xl border border-slate-700 shadow-xl space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="flex flex-col text-left">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Study Mode</label>
                                        <select 
                                            value={selectedMode} 
                                            onChange={(e) => setSelectedMode(e.target.value)}
                                            className="w-full bg-slate-900 border border-slate-600 text-white rounded-xl py-3 px-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                        >
                                            <option value="all">All Modes</option>
                                            <option value="formula">Formulas</option>
                                            <option value="method">Methods & Procedures</option>
                                            <option value="definition">Definitions</option>
                                            <option value="concept">Concepts</option>
                                            <option value="command_term">Command Terms</option>
                                        </select>
                                    </div>
                                    
                                    <div className="flex flex-col text-left">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Syllabus Strand</label>
                                        <select 
                                            value={selectedStrand} 
                                            onChange={(e) => setSelectedStrand(e.target.value)}
                                            disabled={selectedMode === 'command_term'}
                                            className="w-full bg-slate-900 border border-slate-600 text-white rounded-xl py-3 px-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                                        >
                                            <option value="all">All Strands</option>
                                            <option value="1">Topic 1: Number & Algebra</option>
                                            <option value="2">Topic 2: Functions</option>
                                            <option value="3">Topic 3: Geometry & Trig</option>
                                            <option value="4">Topic 4: Stats & Prob</option>
                                            <option value="5">Topic 5: Calculus</option>
                                        </select>
                                    </div>

                                    <div className="flex flex-col text-left">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Course Level</label>
                                        <select 
                                            value={selectedLevel} 
                                            onChange={(e) => setSelectedLevel(e.target.value)}
                                            className="w-full bg-slate-900 border border-slate-600 text-white rounded-xl py-3 px-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                        >
                                            <option value="all">Both (SL & HL)</option>
                                            <option value="sl">SL Only (Core)</option>
                                            <option value="hl">HL Only (Extension)</option>
                                        </select>
                                    </div>
                                </div>

                                <div className="border-t border-slate-700 pt-6">
                                    <div className="flex justify-between items-end mb-4">
                                        <h2 className="text-lg font-semibold text-white">Select Deck Size</h2>
                                        <div className="text-sm font-bold text-blue-400 bg-blue-900/30 px-3 py-1 rounded-lg border border-blue-800">
                                            {filteredDeck.length} Cards Match Filter
                                        </div>
                                    </div>
                                    
                                    {filteredDeck.length > 0 ? (
                                        <div className="grid grid-cols-2 gap-4 md:grid-cols-4">
                                            {[10, 20, 50, 'all'].map(num => {
                                                const countLabel = num === 'all' ? 'All' : num;
                                                const isDisabled = num !== 'all' && num > filteredDeck.length;
                                                return (
                                                    <button 
                                                        key={num}
                                                        onClick={() => startGame(num)}
                                                        disabled={isDisabled}
                                                        className={`px-4 py-3 transition-colors rounded-xl font-bold text-md shadow-sm ${isDisabled ? 'bg-slate-700/50 text-slate-500 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-500 text-white'}`}
                                                    >
                                                        {countLabel}
                                                    </button>
                                                )
                                            })}
                                        </div>
                                    ) : (
                                        <div className="text-yellow-500 bg-yellow-900/20 border border-yellow-700/50 rounded-xl p-4 font-medium">
                                            No cards match your selected filters. Please try another combination.
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (gameState === 'complete') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6">
                        <div className="max-w-md w-full text-center bg-slate-800 p-10 rounded-3xl border border-slate-700 shadow-2xl space-y-6">
                            <h2 className="text-4xl font-bold text-white">Session Complete!</h2>
                            <p className="text-slate-400 py-2">
                                You just reviewed {deck.length} cards.
                            </p>
                            {diagMode && totalFlagged > 0 && (
                                <div className="bg-amber-950/40 border border-amber-600/50 rounded-2xl p-5 text-left space-y-3">
                                    <div className="text-amber-400 font-bold text-sm uppercase tracking-wider">🔍 Diagnostic Summary</div>
                                    <p className="text-slate-300 text-sm">{totalFlagged} card{totalFlagged !== 1 ? 's' : ''} flagged for review.</p>
                                    <div className="space-y-1 max-h-36 overflow-y-auto pr-1">
                                        {Object.values(diagReports).map((r, i) => (
                                            <div key={i} className="text-xs text-slate-400 border-l-2 border-amber-700 pl-2">
                                                <span className="text-amber-300 font-semibold">T{r.cardMeta.t} {r.cardMeta.lvl.toUpperCase()}</span>
                                                {' · '}{r.cardMeta.q.replace(/<[^>]+>/g,'').slice(0, 45)}{r.cardMeta.q.length > 45 ? '…' : ''}
                                                {r.issues.length > 0 && <span className="text-amber-600 ml-1">({r.issues.length} issue{r.issues.length !== 1 ? 's' : ''})</span>}
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex gap-2 pt-1">
                                        <button onClick={exportLog} className="export-btn flex-1">📄 Export TXT</button>
                                        <button onClick={exportJSON} className="export-btn flex-1">📋 Export JSON</button>
                                    </div>
                                </div>
                            )}
                            <button 
                                onClick={() => setGameState('menu')}
                                className="w-full py-4 bg-blue-600 hover:bg-blue-500 transition-colors rounded-xl font-bold text-lg text-white"
                            >
                                Build New Deck
                            </button>
                        </div>
                    </div>
                );
            }

            const currentCard = deck[currentIndex];
            const progress = ((currentIndex + 1) / deck.length) * 100;
            const hasGraph = !!currentCard.graph;
            const hasQGraph = !!currentCard.qgraph;

            const cardBadgeLabel = currentCard.t === 'Exam'
                ? 'Command Term'
                : `Topic ${currentCard.t} • ${currentCard.lvl.toUpperCase()} • ${currentCard.mode}`;

            // ref for card-inner so DesmosGraph can listen to transitionend
            const isFlagged = !!diagReports[currentCardKey];

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 md:p-8">
                    {/* Header bar */}
                    <div className="w-full max-w-5xl flex items-center justify-between mb-8 absolute top-8 px-8">
                        <button onClick={() => setGameState('menu')} className="text-slate-400 hover:text-white transition">
                            ← Exit
                        </button>
                        <div className="flex items-center gap-3">
                            {diagMode && (
                                <div className="relative">
                                    <button
                                        onClick={() => setDiagPanelOpen(o => !o)}
                                        className={`diag-btn-flag ${isFlagged ? 'active' : ''}`}
                                    >
                                        🔍 {isFlagged ? '⚑ Flagged' : 'Flag Issue'}
                                    </button>
                                    {isFlagged && <span className="diag-flagged-indicator" />}
                                </div>
                            )}
                            <div className="text-slate-300 font-medium">
                                Card {currentIndex + 1} / {deck.length}
                                {diagMode && totalFlagged > 0 && (
                                    <span className="diag-log-badge ml-1">{totalFlagged}</span>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Diagnostic Panel */}
                    {diagMode && diagPanelOpen && (
                        <div
                            className="diag-panel absolute z-50 w-full max-w-5xl"
                            style={{ top: '72px', left: '50%', transform: 'translateX(-50%)', maxWidth: '48rem', padding: '1.25rem 1.5rem' }}
                            onClick={e => e.stopPropagation()}
                        >
                            {/* Panel header */}
                            <div className="flex items-center justify-between mb-3">
                                <div className="flex items-center gap-2">
                                    <span className="text-amber-400 font-bold text-sm uppercase tracking-wider">🔍 Flag Issues</span>
                                    <span className="text-slate-500 text-xs">
                                        Topic {currentCard.t} · {currentCard.lvl.toUpperCase()} · {currentCard.mode}
                                    </span>
                                </div>
                                <button
                                    onClick={() => setDiagPanelOpen(false)}
                                    className="text-slate-500 hover:text-white text-lg leading-none"
                                >✕</button>
                            </div>

                            {/* Issue checkboxes */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-0.5 mb-3">
                                {ISSUE_TYPES.map(issue => {
                                    const checked = currentReport.issues.includes(issue.id);
                                    return (
                                        <label key={issue.id} className={`diag-checkbox-label ${checked ? 'checked-item' : ''}`}>
                                            <input
                                                type="checkbox"
                                                checked={checked}
                                                onChange={() => toggleIssue(issue.id)}
                                            />
                                            <span>{issue.icon} {issue.label}</span>
                                        </label>
                                    );
                                })}
                            </div>

                            {/* Comment box */}
                            <div className="mt-2">
                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wider block mb-1">Comment / Notes</label>
                                <textarea
                                    value={currentReport.comment}
                                    onChange={e => setComment(e.target.value)}
                                    placeholder="Describe the error, suggest a fix, note the correct answer…"
                                    rows={3}
                                    className="w-full bg-slate-900 border border-slate-700 text-slate-200 text-sm rounded-lg px-3 py-2 outline-none focus:border-amber-500 resize-none placeholder-slate-600"
                                />
                            </div>

                            {/* Export buttons */}
                            <div className="flex items-center justify-between mt-3 pt-3 border-t border-slate-800">
                                <span className="text-xs text-slate-500">{totalFlagged} card{totalFlagged !== 1 ? 's' : ''} flagged in this session</span>
                                <div className="flex gap-2">
                                    <button onClick={exportLog} disabled={totalFlagged === 0} className="export-btn">📄 Export TXT</button>
                                    <button onClick={exportJSON} disabled={totalFlagged === 0} className="export-btn">📋 Export JSON</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Progress Bar */}
                    <div className="w-full max-w-5xl h-2 bg-slate-800 rounded-full mb-10 overflow-hidden absolute top-20">
                        <div className="h-full bg-blue-500 transition-all duration-300 ease-out" style={{width: `${progress}%`}}></div>
                    </div>

                    {/* Flashcard */}
                    <div
                        className="perspective-1000 w-full max-w-5xl cursor-pointer mt-16"
                        style={{ height: (hasGraph || hasQGraph) ? '620px' : '480px' }}
                        onClick={() => { if (!diagPanelOpen) handleCardClick(); }}
                    >
                        <div className={`card-inner ${isFlipped ? 'is-flipped' : 'back-hidden'}`} ref={cardInnerRef} style={isFlagged ? {outline: '2px solid rgba(245,158,11,0.6)', borderRadius:'1.5rem'} : {}}>

                            {/* Front */}
                            {hasQGraph ? (
                                <div className="card-face card-front" style={{justifyContent:'flex-start',alignItems:'stretch',padding:0}}>
                                    <div className="graph-answer-strip" ref={frontRef} style={{opacity: (!isFlipped && mathReady) ? 1 : 0, transition:'opacity 0.15s ease'}}>
                                        <span className={`inline-block mb-2 px-3 py-1 text-xs font-bold rounded-full border uppercase tracking-wider ${currentCard.t === 'Exam' ? 'bg-purple-900/50 text-purple-400 border-purple-700' : 'bg-slate-800 text-blue-400 border-slate-700'}`}>
                                            {cardBadgeLabel}
                                        </span>
                                        <h2 className="text-xl md:text-2xl font-medium leading-relaxed mt-1" dangerouslySetInnerHTML={{__html: currentCard.q}} />
                                        {currentCard.qgraph.caption && (
                                            <div className="text-xs text-slate-400 italic mt-1" dangerouslySetInnerHTML={{__html: currentCard.qgraph.caption}} />
                                        )}
                                    </div>
                                    <div className="desmos-wrapper">
                                        <DesmosGraph spec={currentCard.qgraph} innerRef={cardInnerRef} isFlipped={isFlipped} isFront={true} />
                                    </div>
                                </div>
                            ) : (
                                <div className="card-face card-front">
                                    <span className={`absolute top-6 left-6 px-3 py-1 text-xs font-bold rounded-full border uppercase tracking-wider ${currentCard.t === 'Exam' ? 'bg-purple-900/50 text-purple-400 border-purple-700' : 'bg-slate-800 text-blue-400 border-slate-700'}`}>
                                        {cardBadgeLabel}
                                    </span>
                                    <div ref={frontRef} style={{opacity: (!isFlipped && mathReady) ? 1 : 0, transition:'opacity 0.15s ease', textAlign:'center', padding:'0 1rem', marginTop:'2rem'}}>
                                        <h2 className="text-2xl md:text-3xl font-medium leading-relaxed" dangerouslySetInnerHTML={{__html: currentCard.q}} />
                                    </div>
                                </div>
                            )}

                            {/* Back — two layouts: plain or graph */}
                            {hasGraph ? (
                                <div className="card-face card-back-graph" style={{justifyContent:"flex-start",alignItems:"stretch",padding:0}}>
                                    {/* Answer text strip — MathJax only touches this div */}
                                    <div className="graph-answer-strip" ref={backTextRef} style={{opacity: (isFlipped && backReady) ? 1 : 0, transition:'opacity 0.15s ease'}}>
                                        <span className={`inline-block mb-2 px-3 py-1 text-xs font-bold rounded-full uppercase tracking-wider ${currentCard.t === 'Exam' ? 'bg-purple-800 text-purple-200' : 'bg-blue-800/80 text-blue-200'}`}>
                                            Answer / Method
                                        </span>
                                        <div className="text-lg md:text-xl font-medium leading-relaxed whitespace-pre-line" dangerouslySetInnerHTML={{__html: currentCard.a}} />
                                        {currentCard.graph.caption && (
                                            <div className="text-xs text-slate-400 italic mt-1" dangerouslySetInnerHTML={{__html: currentCard.graph.caption}} />
                                        )}
                                    </div>
                                    {/* Desmos pane — separate from MathJax scope */}
                                    <div className="desmos-wrapper">
                                        <DesmosGraph spec={currentCard.graph} innerRef={cardInnerRef} />
                                    </div>
                                </div>
                            ) : (
                                <div className="card-face card-back">
                                    <span className={`absolute top-6 left-6 px-3 py-1 text-xs font-bold rounded-full uppercase tracking-wider ${currentCard.t === 'Exam' ? 'bg-purple-800 text-purple-200' : 'bg-blue-800 text-blue-200'}`}>
                                        {currentCard.t === 'Exam' ? 'Meaning' : 'Answer / Method'}
                                    </span>
                                    <div ref={backTextRef} style={{opacity: (isFlipped && backReady) ? 1 : 0, transition:'opacity 0.15s ease'}} className="text-xl md:text-2xl font-medium text-center leading-relaxed whitespace-pre-line px-4 mt-8" dangerouslySetInnerHTML={{__html: currentCard.a}} />
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Keyboard Instructions */}
                    <div className="w-full max-w-5xl mt-12 text-center text-slate-500 flex justify-center items-center gap-6">
                        <div className="flex items-center gap-2">
                            <kbd className="px-2 py-1 bg-slate-800 border border-slate-700 rounded-md text-xs font-mono text-slate-300">←</kbd>
                            <kbd className="px-2 py-1 bg-slate-800 border border-slate-700 rounded-md text-xs font-mono text-slate-300">→</kbd>
                            <span className="text-sm">Navigate</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <kbd className="px-2 py-1 bg-slate-800 border border-slate-700 rounded-md text-xs font-mono text-slate-300">↑</kbd>
                            <kbd className="px-2 py-1 bg-slate-800 border border-slate-700 rounded-md text-xs font-mono text-slate-300">↓</kbd>
                            <span className="text-sm">Flip (or Click)</span>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
